<!DOCTYPE html>
<html lang="ja" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ちょきん箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    animation: {
                        'bounce-slow': 'bounce 3s infinite',
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'trayUp': 'trayUp 0.3s ease-out'
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' },
                        },
                        trayUp: { '0%': { transform: 'translateY(100%)' }, '100%': { transform: 'translateY(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: 'sans-serif'; }
        .progress-wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #3b82f6;
            transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .liquid-container {
            position: relative;
            height: 260px;
            width: 180px;
            border: 8px solid #334155;
            border-radius: 20px 20px 40px 40px;
            overflow: hidden;
            background: #f1f5f9;
        }
        .dark .liquid-container { background: #0f172a; border-color: #475569; }
        .tenkey-btn { @apply h-20 bg-slate-100 dark:bg-slate-800 rounded-2xl text-4xl font-black active:bg-blue-500 active:text-white transition-all shadow-sm; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen pb-20">

    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-3">
                <!-- おこづかい帳に戻るボタン -->
                <a href="index.html" class="p-2 text-slate-400 hover:text-blue-500 transition">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                    </svg>
                </a>
                <h1 class="text-3xl font-black tracking-tighter">ちょきん箱</h1>
            </div>
            <button onclick="toggleDarkMode()" class="p-3 rounded-2xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800">
                <span class="dark:hidden">🌙</span><span class="hidden dark:inline">☀️</span>
            </button>
        </header>

        <div class="flex flex-col items-center mb-8">
            <div class="mb-2 text-center">
                <span id="goal-name" class="text-xl font-black text-blue-500">目標：読み込み中...</span>
            </div>
            
            <div class="liquid-container shadow-2xl mb-4" id="bottle">
                <div id="liquid" class="progress-wave"></div>
                <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                    <div id="percent-text" class="text-5xl font-black text-slate-800 dark:text-white mix-blend-difference">0%</div>
                    <div id="current-amount" class="text-base font-bold opacity-70">¥0</div>
                </div>
            </div>
            
            <div id="remaining-amount" class="text-xl font-black text-slate-400">あと ¥0</div>
        </div>

        <div class="mb-6">
            <div class="flex justify-between items-end mb-2 ml-2">
                <label class="text-[0.8rem] font-black text-blue-500 uppercase tracking-widest">ちょきんする！</label>
                <button onclick="openManualInput('add')" class="text-xs font-black bg-blue-100 dark:bg-blue-900/30 text-blue-600 px-3 py-1 rounded-full">細かく入力</button>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="addMoney(100)" class="py-4 bg-blue-500 text-white rounded-2xl font-black shadow-md active:scale-90 transition">¥100</button>
                <button onclick="addMoney(200)" class="py-4 bg-blue-500 text-white rounded-2xl font-black shadow-md active:scale-90 transition">¥200</button>
                <button onclick="addMoney(300)" class="py-4 bg-blue-500 text-white rounded-2xl font-black shadow-md active:scale-90 transition">¥300</button>
                <button onclick="addMoney(400)" class="py-4 bg-blue-500 text-white rounded-2xl font-black shadow-md active:scale-90 transition">¥400</button>
                <button onclick="addMoney(500)" class="py-4 bg-blue-500 text-white rounded-2xl font-black shadow-md active:scale-90 transition col-span-2">¥500</button>
            </div>
        </div>

        <div class="mb-10">
            <div class="flex justify-between items-end mb-2 ml-2">
                <label class="text-[0.8rem] font-black text-slate-400 uppercase tracking-widest">つかっちゃった…</label>
                <button onclick="openManualInput('spend')" class="text-xs font-black bg-slate-200 dark:bg-slate-800 text-slate-500 px-3 py-1 rounded-full">細かく入力</button>
            </div>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="spendMoney(100)" class="py-4 bg-white dark:bg-slate-900 text-slate-500 rounded-2xl font-black shadow-sm border border-slate-200 dark:border-slate-800 active:scale-95 transition">¥100</button>
                <button onclick="spendMoney(200)" class="py-4 bg-white dark:bg-slate-900 text-slate-500 rounded-2xl font-black shadow-sm border border-slate-200 dark:border-slate-800 active:scale-95 transition">¥200</button>
                <button onclick="spendMoney(300)" class="py-4 bg-white dark:bg-slate-900 text-slate-500 rounded-2xl font-black shadow-sm border border-slate-200 dark:border-slate-800 active:scale-95 transition">¥300</button>
                <button onclick="spendMoney(400)" class="py-4 bg-white dark:bg-slate-900 text-slate-500 rounded-2xl font-black shadow-sm border border-slate-200 dark:border-slate-800 active:scale-95 transition">¥400</button>
                <button onclick="spendMoney(500)" class="py-4 bg-white dark:bg-slate-900 text-slate-500 rounded-2xl font-black shadow-sm border border-slate-200 dark:border-slate-800 active:scale-95 transition col-span-2">¥500</button>
            </div>
        </div>

        <details class="mb-10 group">
            <summary class="list-none text-center text-xs font-black text-slate-400 cursor-pointer group-open:mb-4">⚙️ もくひょうを変える</summary>
            <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] border-2 border-slate-100 dark:border-slate-800 space-y-4">
                <input type="text" id="goal-input" placeholder="なにがほしい？" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 font-black outline-none border-2 border-transparent focus:border-blue-500 text-main" onchange="updateSettings()">
                <input type="number" id="target-input" placeholder="いくら？" class="w-full p-4 rounded-xl bg-slate-50 dark:bg-slate-800 font-black outline-none border-2 border-transparent focus:border-blue-500 text-main" onchange="updateSettings()">
            </div>
        </details>

        <div id="mini-history" class="space-y-2 mb-10"></div>
    </div>

    <div id="input-modal" class="fixed inset-0 z-[2000] hidden flex items-end sm:items-center justify-center bg-slate-950/60 backdrop-blur-sm p-4">
        <div class="bg-white dark:bg-slate-900 w-full max-w-md rounded-t-[3rem] sm:rounded-[3rem] p-6 shadow-2xl animate-trayUp">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modal-title" class="font-black text-xl">いくら？</h3>
                <button onclick="closeManualInput()" class="p-2 text-slate-400 text-2xl font-black">✕</button>
            </div>
            
            <div class="relative mb-6">
                <input type="number" id="manual-amount-input" class="w-full p-6 text-5xl font-black text-right bg-slate-50 dark:bg-slate-800 rounded-3xl border-4 border-blue-500 outline-none tabular-nums" placeholder="0">
                <div class="absolute left-6 top-1/2 -translate-y-1/2 text-2xl font-black text-slate-400">¥</div>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-6">
                <button onclick="pressKey('1')" class="tenkey-btn">1</button>
                <button onclick="pressKey('2')" class="tenkey-btn">2</button>
                <button onclick="pressKey('3')" class="tenkey-btn">3</button>
                <button onclick="pressKey('4')" class="tenkey-btn">4</button>
                <button onclick="pressKey('5')" class="tenkey-btn">5</button>
                <button onclick="pressKey('6')" class="tenkey-btn">6</button>
                <button onclick="pressKey('7')" class="tenkey-btn">7</button>
                <button onclick="pressKey('8')" class="tenkey-btn">8</button>
                <button onclick="pressKey('9')" class="tenkey-btn">9</button>
                <button onclick="pressKey('C')" class="tenkey-btn bg-slate-200 dark:bg-slate-700 text-2xl">消去</button>
                <button onclick="pressKey('0')" class="tenkey-btn">0</button>
                <button onclick="submitManualInput()" id="submit-btn" class="tenkey-btn bg-blue-500 text-white text-2xl">OK</button>
            </div>
        </div>
    </div>

    <script>
        const SAVINGS_KEY = 'adhd_savings_data_v2';
        let state = JSON.parse(localStorage.getItem(SAVINGS_KEY)) || {
            current: 0, target: 5000, goal: "ほしいもの", history: []
        };
        let currentMode = 'add';

        function init() {
            if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
            document.getElementById('goal-input').value = state.goal;
            document.getElementById('target-input').value = state.target;
            updateUI();
        }

        function updateUI() {
            const percent = Math.min(Math.round((state.current / state.target) * 100), 100);
            document.getElementById('liquid').style.height = `${percent}%`;
            document.getElementById('percent-text').innerText = `${percent}%`;
            document.getElementById('current-amount').innerText = `¥${state.current.toLocaleString()}`;
            document.getElementById('remaining-amount').innerText = `あと ¥${Math.max(0, state.target - state.current).toLocaleString()}`;
            document.getElementById('goal-name').innerText = `目標：${state.goal}`;

            if (percent >= 100) document.getElementById('bottle').classList.add('animate-bounce-slow');
            else document.getElementById('bottle').classList.remove('animate-bounce-slow');

            const container = document.getElementById('mini-history');
            container.innerHTML = state.history.slice(0, 3).map(item => `
                <div class="flex justify-between p-4 bg-white dark:bg-slate-900 rounded-2xl border border-slate-100 dark:border-slate-800 shadow-sm animate-trayUp">
                    <span class="text-xs font-black text-slate-400">${item.date}</span>
                    <span class="font-black ${item.type === 'add' ? 'text-blue-500' : 'text-slate-400'}">
                        ${item.type === 'add' ? '＋' : '－'} ¥${item.amount.toLocaleString()}
                    </span>
                </div>
            `).join('');

            localStorage.setItem(SAVINGS_KEY, JSON.stringify(state));
        }

        function addMoney(amount) {
            state.current += amount;
            state.history.unshift({ type: 'add', amount, date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
            confetti({ particleCount: 40, spread: 70, origin: { y: 0.8 } });
            updateUI();
        }

        function spendMoney(amount) {
            state.current = Math.max(0, state.current - amount);
            state.history.unshift({ type: 'spend', amount, date: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
            const b = document.getElementById('bottle');
            b.classList.add('animate-shake');
            setTimeout(() => b.classList.remove('animate-shake'), 500);
            updateUI();
        }

        function openManualInput(mode) {
            currentMode = mode;
            document.getElementById('modal-title').innerText = mode === 'add' ? 'いくら貯金する？' : 'いくら使った？';
            document.getElementById('submit-btn').className = mode === 'add' ? 'tenkey-btn bg-blue-500 text-white text-2xl' : 'tenkey-btn bg-slate-600 text-white text-2xl';
            document.getElementById('manual-amount-input').value = '';
            document.getElementById('input-modal').classList.remove('hidden');
        }

        function closeManualInput() { document.getElementById('input-modal').classList.add('hidden'); }

        function pressKey(key) {
            const input = document.getElementById('manual-amount-input');
            if (key === 'C') input.value = '';
            else {
                if (input.value.length >= 8) return;
                input.value += key;
            }
        }

        function submitManualInput() {
            const val = parseInt(document.getElementById('manual-amount-input').value);
            if (val > 0) {
                if (currentMode === 'add') addMoney(val);
                else spendMoney(val);
            }
            closeManualInput();
        }

        function updateSettings() {
            state.goal = document.getElementById('goal-input').value || "ほしいもの";
            state.target = parseInt(document.getElementById('target-input').value) || 5000;
            updateUI();
        }

        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        init();
    </script>
</body>
</html>
